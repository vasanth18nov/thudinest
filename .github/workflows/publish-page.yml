name: Publish page from issue

on:
  issues:
    types: [opened, edited]

permissions:
  contents: write
  issues: write

jobs:
  publish:
    if: contains(github.event.issue.labels.*.name, 'publish-request')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate page
        id: generate
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
          PAGES_BASE_URL: ${{ vars.PAGES_BASE_URL || 'https://thudinest.com' }}
        run: node scripts/generate-page.js

      - name: Commit and push
        if: steps.generate.outputs.status == 'ok'
        run: |
          git config user.name "thudinesthosting-bot"
          git config user.email "actions@users.noreply.github.com"
          git add p/
          git commit -m "Publish page: ${{ steps.generate.outputs.slug }} (issue #${{ github.event.issue.number }})"
          git push

      - name: Comment success
        if: steps.generate.outputs.status == 'ok'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `✅ ${{ steps.generate.outputs.message }}`,
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: "closed",
            });

      - name: Comment error
        if: steps.generate.outputs.status == 'error'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `❌ ${{ steps.generate.outputs.message }}`,
            });
