name: "Publish a page"
description: "Submit your business details to publish a free page on ThudinestHosting."
title: "Publish request: "
labels: ["publish-request"]
body:
  - type: input
    id: access-code
    attributes:
      label: Access code
      description: "The code given to you by ThudinestHosting."
      placeholder: thudinest
    validations:
      required: true

  - type: input
    id: slug
    attributes:
      label: Page URL (slug)
      description: "Lowercase letters, numbers and hyphens only. This becomes your page's web address."
      placeholder: fresh-grocer
    validations:
      required: true

  - type: input
    id: business-name
    attributes:
      label: Business name
      placeholder: Fresh Grocer
    validations:
      required: true

  - type: dropdown
    id: theme
    attributes:
      label: Theme
      options:
        - retail
        - education
        - industry
      default: 0
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      placeholder: Farm fresh vegetables delivered daily in Coimbatore.
    validations:
      required: true

  - type: input
    id: phone
    attributes:
      label: Phone number
      placeholder: "+91 98765 43210"
    validations:
      required: false

  - type: input
    id: whatsapp
    attributes:
      label: WhatsApp number
      placeholder: "+91 98765 43210"
    validations:
      required: false

  - type: input
    id: email
    attributes:
      label: Email
      placeholder: you@business.com
    validations:
      required: false

  - type: input
    id: address
    attributes:
      label: Address
      placeholder: RS Puram, Coimbatore
    validations:
      required: false

  - type: input
    id: image-urls
    attributes:
      label: Photo URLs (optional)
      description: "Comma-separated links to photos (e.g. upload images to this issue first, then paste the links GitHub gives you)."
      placeholder: "https://github.com/user-attachments/assets/..., https://github.com/user-attachments/assets/..."
    validations:
      required: false
