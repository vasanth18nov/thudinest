<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{BUSINESS_NAME}} | ThudinestHosting</title>
<meta name="description" content="{{DESCRIPTION}}">
<style>
  :root {
    --brand: {{THEME_COLOR}};
    --brand-dark: {{THEME_COLOR_DARK}};
    --brand-light: {{THEME_COLOR_LIGHT}};
    --ink: #101418;
    --paper: #fafaf9;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--paper);
    color: var(--ink);
  }
  .hero {
    background: linear-gradient(135deg, var(--brand), var(--brand-dark));
    color: #fff;
    padding: 48px 24px 56px;
    text-align: center;
  }
  .hero .badge {
    display: inline-block;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    font-size: 11px;
    font-weight: 600;
    background: rgba(255,255,255,0.18);
    border-radius: 999px;
    padding: 5px 14px;
    margin-bottom: 14px;
  }
  .hero h1 { margin: 0; font-size: 2rem; font-weight: 800; }
  .hero p { margin: 10px auto 0; max-width: 34rem; opacity: 0.92; font-size: 1rem; line-height: 1.6; }
  .actions {
    display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 22px;
  }
  .actions a {
    display: inline-flex; align-items: center; gap: 6px;
    background: #fff; color: var(--brand-dark);
    border-radius: 999px; padding: 10px 18px;
    font-size: 0.9rem; font-weight: 600; text-decoration: none;
  }
  .actions a.wa { background: #25D366; color: #fff; }
  main { max-width: 760px; margin: 0 auto; padding: 40px 24px 20px; }
  .gallery {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px; margin-bottom: 32px;
  }
  .gallery img {
    width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 14px;
    border: 1px solid rgba(0,0,0,0.08);
  }
  .info {
    border: 1px solid rgba(0,0,0,0.08); border-radius: 16px;
    padding: 22px 24px; background: #fff; margin-bottom: 24px;
  }
  .info h2 { margin: 0 0 12px; font-size: 1.1rem; }
  .info dl { margin: 0; }
  .info dt { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; color: rgba(16,20,24,0.5); margin-top: 12px; }
  .info dt:first-child { margin-top: 0; }
  .info dd { margin: 2px 0 0; font-size: 0.98rem; }
  footer {
    text-align: center; padding: 28px 24px; font-size: 0.78rem; color: rgba(16,20,24,0.4);
  }
  footer a { color: var(--brand-dark); font-weight: 600; text-decoration: none; }
</style>
</head>
<body>
  <div class="hero">
    <span class="badge">{{THEME_LABEL}}</span>
    <h1>{{BUSINESS_NAME}}</h1>
    <p>{{DESCRIPTION}}</p>
    <div class="actions">
      {{PHONE_ACTION}}
      {{WHATSAPP_ACTION}}
    </div>
  </div>

  <main>
    {{GALLERY_BLOCK}}

    <div class="info">
      <h2>Contact</h2>
      <dl>
        {{PHONE_ROW}}
        {{WHATSAPP_ROW}}
        {{EMAIL_ROW}}
        {{ADDRESS_ROW}}
      </dl>
    </div>
  </main>

  <footer>
    Powered by <a href="../../index.html">ThudinestHosting</a>
  </footer>
</body>
</html>
