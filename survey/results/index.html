<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Live Results | ThudinestHosting</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root { --brand: #38bdf8; --brand-dark: #0284c7; --brand-light: #7dd3fc; }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; color: #fff; font-family: 'Inter', sans-serif;
    background: radial-gradient(ellipse at 50% 0%, #1a1a3e 0%, #0a0a1a 60%);
  }
  .wrap { max-width: 780px; margin: 0 auto; padding: 40px 20px 80px; }
  .top-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 6px; }
  h1 { font-family: 'Space Grotesk', sans-serif; font-size: clamp(1.5rem, 5vw, 2rem); margin: 0; }
  .status { display: flex; align-items: center; gap: 8px; font-size: 0.82rem; color: rgba(255,255,255,0.5); }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; animation: pulse 1.6s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  .count { font-size: 0.95rem; color: rgba(255,255,255,0.7); margin: 4px 0 30px; }
  .count strong { color: #fff; }
  .banner { border-radius: 12px; padding: 14px 16px; font-size: 0.9rem; }
  .banner.error { background: rgba(248,113,113,0.12); border: 1px solid rgba(248,113,113,0.4); color: #fecaca; }
  .q-card {
    border: 1px solid rgba(255,255,255,0.1); border-radius: 18px; padding: 24px;
    background: rgba(255,255,255,0.035); backdrop-filter: blur(12px); margin-bottom: 22px;
  }
  .q-card h2 { font-family: 'Space Grotesk', sans-serif; font-size: 1.1rem; margin: 0 0 20px; }
  .bar-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .bar-label { width: 130px; flex: none; font-size: 0.85rem; color: rgba(255,255,255,0.8); overflow-wrap: anywhere; }
  .bar-track { flex: 1; height: 26px; background: rgba(255,255,255,0.06); border-radius: 8px; overflow: hidden; position: relative; }
  .bar-fill {
    height: 100%; background: linear-gradient(90deg, var(--brand-dark), var(--brand));
    border-radius: 8px; transition: width 0.5s ease; min-width: 2px;
  }
  .bar-count { width: 48px; flex: none; text-align: right; font-size: 0.85rem; color: rgba(255,255,255,0.6); }
  .cloud-wrap { border-radius: 14px; overflow: hidden; background: #000; }
  .cloud-wrap svg { width: 100%; height: auto; display: block; }
  .empty-note { color: rgba(255,255,255,0.35); font-size: 0.85rem; font-style: italic; }
</style>
</head>
<body>
<div class="wrap">
  <div class="top-row">
    <h1 id="surveyTitle">Loading&hellip;</h1>
    <div class="status"><span class="dot"></span> Live</div>
  </div>
  <p class="count" id="countLine"></p>
  <div id="content"></div>
</div>

<script>
  const WORKER_BASE = "https://thudinesthosting-publish.thudinesthosting.workers.dev";
  const params = new URLSearchParams(location.search);
  const surveyId = (params.get("id") || "").trim();
  const key = (params.get("key") || "").trim();
  const contentEl = document.getElementById("content");
  const titleEl = document.getElementById("surveyTitle");
  const countLineEl = document.getElementById("countLine");

  const STOPWORDS = new Set([
    "the","and","for","are","but","not","you","your","with","this","that","from","have",
    "has","had","was","were","will","would","can","could","should","our","their","its",
    "a","an","of","in","on","at","to","is","as","by","or","we","us","i","be","been",
    "being","all","any","also","more","most","some","such","no","nor","only","own",
    "same","so","than","too","very","just","into","about","over","under","then","once",
    "here","there","when","where","why","how","what","which","who","whom","get","one",
  ]);

  function hashString(str) {
    let h = 0;
    for (let i = 0; i < str.length; i++) h = (Math.imul(31, h) + str.charCodeAt(i)) | 0;
    return h >>> 0;
  }
  function seededRandom(seed) {
    let s = seed >>> 0;
    return function () {
      s = (s + 0x6d2b79f5) >>> 0;
      let t = s;
      t = Math.imul(t ^ (t >>> 15), t | 1);
      t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }
  function rectsOverlap(a, b) {
    return !(a.x + a.w < b.x || b.x + b.w < a.x || a.y + a.h < b.y || b.y + b.h < a.y);
  }
  function extractTopWords(texts, limit) {
    const counts = new Map();
    const words = texts.join(" ").toLowerCase().match(/[a-z']+/g) || [];
    for (const w of words) {
      if (w.length < 3 || STOPWORDS.has(w)) continue;
      counts.set(w, (counts.get(w) || 0) + 1);
    }
    return [...counts.entries()].sort((a, b) => b[1] - a[1]).slice(0, limit);
  }
  function esc(s) {
    return String(s || "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
  }

  function buildWordCloudSvg(texts) {
    const words = extractTopWords(texts, 40);
    if (words.length === 0) return null;
    const W = 900, H = 260;
    const rand = seededRandom(hashString(texts.join("|")));
    const maxCount = words[0][1];
    const palette = ["#38bdf8", "#7dd3fc", "#ffffff", "#f5c842", "#22d3ee", "#ec4899", "#84cc16", "#a855f7"];
    const placed = [];
    const items = [];

    function tryPlace(word, fontSize, packFactor) {
      const approxW = word.length * fontSize * 0.56 * packFactor;
      const approxH = fontSize * 1.05 * packFactor;
      const cx = W / 2, cy = H / 2;
      let angle = rand() * Math.PI * 2, radius = 0;
      for (let tries = 0; tries < 320; tries++) {
        const x = cx + Math.cos(angle) * radius - approxW / 2;
        const y = cy + Math.sin(angle) * radius * 0.55 - approxH / 2;
        const box = { x, y, w: approxW, h: approxH };
        if (x >= 6 && y >= 6 && x + approxW <= W - 6 && y + approxH <= H - 6 && !placed.some((p) => rectsOverlap(p, box))) {
          placed.push(box);
          return { x: x + approxW / 2, y: y + approxH * 0.72 };
        }
        angle += 0.32;
        radius += 3;
      }
      return null;
    }

    const overflow = [];
    words.forEach(([word, count], i) => {
      const freqRatio = count / maxCount;
      const rankRatio = 1 - i / words.length;
      const sizeRatio = freqRatio * 0.55 + rankRatio * 0.45;
      const fontSize = Math.round(16 + sizeRatio * 38);
      const pos = tryPlace(word, fontSize, 1);
      if (!pos) { overflow.push([word, fontSize]); return; }
      const color = palette[Math.floor(rand() * palette.length)];
      const opacity = Math.min(0.92, 0.45 + sizeRatio * 0.47).toFixed(2);
      const rotate = i % 4 === 0 ? (rand() > 0.5 ? -8 : 8) : 0;
      const tx = pos.x.toFixed(1), ty = pos.y.toFixed(1);
      items.push(`<text x="${tx}" y="${ty}" font-size="${fontSize}" font-family="'Space Grotesk', sans-serif" font-weight="700" fill="${color}" fill-opacity="${opacity}" text-anchor="middle"${rotate ? ` transform="rotate(${rotate} ${tx} ${ty})"` : ""}>${esc(word)}</text>`);
    });
    overflow.forEach(([word, fontSize]) => {
      const smallSize = Math.max(12, Math.round(fontSize * 0.6));
      const pos = tryPlace(word, smallSize, 0.92);
      if (!pos) return;
      const color = palette[Math.floor(rand() * palette.length)];
      const tx = pos.x.toFixed(1), ty = pos.y.toFixed(1);
      items.push(`<text x="${tx}" y="${ty}" font-size="${smallSize}" font-family="'Space Grotesk', sans-serif" font-weight="700" fill="${color}" fill-opacity="0.4" text-anchor="middle">${esc(word)}</text>`);
    });

    return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${W} ${H}"><rect width="${W}" height="${H}" fill="#000"/>${items.join("")}</svg>`;
  }

  let structureRendered = false;

  function render(data) {
    titleEl.textContent = data.title;
    countLineEl.innerHTML = `<strong>${data.responseCount}</strong> response${data.responseCount === 1 ? "" : "s"} so far`;

    if (!structureRendered) {
      contentEl.innerHTML = data.questions
        .map((q) => `<div class="q-card" id="card-${q.id}"><h2>${esc(q.prompt)}</h2><div id="body-${q.id}"></div></div>`)
        .join("");
      structureRendered = true;
    }

    data.questions.forEach((q) => {
      const bodyEl = document.getElementById(`body-${q.id}`);
      if (!bodyEl) return;
      if (q.type === "choice") {
        const tally = data.tallies[q.id] || {};
        const total = Object.values(tally).reduce((a, b) => a + b, 0);
        bodyEl.innerHTML = q.options
          .map((opt) => {
            const count = tally[opt] || 0;
            const pct = total > 0 ? (count / total) * 100 : 0;
            return `<div class="bar-row">
              <div class="bar-label">${esc(opt)}</div>
              <div class="bar-track"><div class="bar-fill" style="width:${pct.toFixed(1)}%"></div></div>
              <div class="bar-count">${count}</div>
            </div>`;
          })
          .join("");
      } else {
        const texts = data.textAnswers[q.id] || [];
        if (texts.length === 0) {
          bodyEl.innerHTML = `<p class="empty-note">No answers yet&hellip;</p>`;
          return;
        }
        const svg = buildWordCloudSvg(texts);
        bodyEl.innerHTML = svg ? `<div class="cloud-wrap">${svg}</div>` : `<p class="empty-note">No answers yet&hellip;</p>`;
      }
    });
  }

  async function poll() {
    if (!surveyId || !key) {
      titleEl.textContent = "Missing survey ID or key";
      contentEl.innerHTML = '<div class="banner error">This results link looks incomplete.</div>';
      return;
    }
    try {
      const res = await fetch(`${WORKER_BASE}/api/survey/results?id=${encodeURIComponent(surveyId)}&key=${encodeURIComponent(key)}`);
      const data = await res.json();
      if (!data.ok) {
        titleEl.textContent = "Couldn't load results";
        contentEl.innerHTML = `<div class="banner error">${data.error || "Unknown error."}</div>`;
        return;
      }
      render(data);
    } catch (err) {
      // Keep showing last-known results on transient network errors.
      console.error(err);
    }
  }

  poll();
  setInterval(poll, 2000);
</script>
</body>
</html>
